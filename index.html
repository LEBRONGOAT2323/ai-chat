<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PHANTOM AI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #app { width: 100%; max-width: 700px; height: 100vh; max-height: 760px; display: flex; flex-direction: column; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 32px rgba(0,0,0,0.10); }
  header { padding: 16px 22px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #1D9E75; }
  header h1 { font-size: 16px; font-weight: 600; color: #111; }
  header span { font-size: 12px; color: #999; margin-left: auto; }
  #messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 14px; }
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 10px; color: #aaa; }
  .empty svg { opacity: 0.3; }
  .empty p { font-size: 14px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 6px; }
  .chip { padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd; background: #fafafa; font-size: 12px; color: #666; cursor: pointer; transition: all 0.15s; }
  .chip:hover { background: #fff; border-color: #bbb; color: #333; }
  .msg { display: flex; gap: 10px; max-width: 88%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
  .msg.ai .avatar { background: #f0f0f0; color: #888; border: 1px solid #e5e5e5; }
  .msg.user .avatar { background: #c4bdf0; color: #3a2d8a; }
  .bubble { padding: 11px 15px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .msg.ai .bubble { background: #f4f4f1; color: #111; border-radius: 4px 14px 14px 14px; }
  .msg.user .bubble { background: #533AB7; color: #fff; border-radius: 14px 4px 14px 14px; }
  .typing { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  #composer { padding: 14px 18px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; border: 1px solid #ddd; border-radius: 12px; padding: 10px 14px; font-size: 14px; font-family: inherit; resize: none; min-height: 42px; max-height: 130px; background: #fafafa; color: #111; line-height: 1.5; outline: none; transition: border-color 0.15s; }
  textarea:focus { border-color: #888; background: #fff; }
  button#send { width: 38px; height: 38px; border-radius: 50%; background: #533AB7; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s, transform 0.1s; }
  button#send:hover { opacity: 0.85; }
  button#send:active { transform: scale(0.94); }
  button#send:disabled { opacity: 0.3; cursor: default; }
  button#send svg { fill: white; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="dot"></div>
    <h1>PHANTOM AI</h1>
    <span>Powered by PHANTOM</span>
  </header>
  <div id="messages">
    <div class="empty" id="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>Ask me anything</p>
      <div class="chips">
        <button class="chip" onclick="pick(this)">Explain black holes</button>
        <button class="chip" onclick="pick(this)">Write a short poem</button>
        <button class="chip" onclick="pick(this)">Give me a fun fact</button>
        <button class="chip" onclick="pick(this)">Help me brainstorm</button>
      </div>
    </div>
  </div>
  <div id="composer">
    <textarea id="input" placeholder="Type a message…" rows="1"></textarea>
    <button id="send" onclick="sendMsg()" aria-label="Send">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>
  </div>
</div>

<script>
  const msgsEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  let history = [];

  function pick(btn) { inputEl.value = btn.textContent; sendMsg(); }

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });

  function clearEmpty() {
    const e = document.getElementById('empty');
    if (e) e.remove();
  }

  function addBubble(role, text) {
    clearEmpty();
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = role === 'user' ? 'You' : 'AI';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = text;
    wrap.appendChild(av);
    wrap.appendChild(bub);
    msgsEl.appendChild(wrap);
    msgsEl.scrollTop = msgsEl.scrollHeight;
    return bub;
  }

  function showTyping() {
    clearEmpty();
    const wrap = document.createElement('div');
    wrap.className = 'msg ai'; wrap.id = 'typing';
    const av = document.createElement('div');
    av.className = 'avatar'; av.textContent = 'AI';
    const bub = document.createElement('div');
    bub.className = 'bubble typing';
    bub.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(av); wrap.appendChild(bub);
    msgsEl.appendChild(wrap);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMsg() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;
    inputEl.value = ''; inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    addBubble('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('https://ai-chat-production-a519.up.railway.app/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history.slice(-6) })  
      });
      const data = await res.json();
      removeTyping();
      if (data.reply) {
        history.push({ role: 'assistant', content: data.reply });
        addBubble('ai', data.reply);
      } else {
        addBubble('ai', data.reply || 'Something went wrong. Please try again.');
      }
    } catch(e) {
      removeTyping();
      addBubble('ai', 'Could not connect to server. Is it running? (node server.js)');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

</script>
</body>
</html>
